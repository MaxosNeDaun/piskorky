<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku Online Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100-screen;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .grid-board { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; 
            padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .cell { 
            aspect-ratio: 1; background: rgba(255, 255, 255, 0.03);
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; cursor: pointer; user-select: none; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
        }
        .cell:hover:not(.filled) { 
            background: rgba(255, 255, 255, 0.1); 
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .cell.filled { cursor: default; }
        .cell.win { 
            background: #22c55e !important; 
            color: white;
            box-shadow: 0 0 20px #22c55e;
            z-index: 10;
        }
        .turn-active {
            border: 2px solid #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="flex flex-col lg:flex-row gap-8 w-full max-w-5xl items-start">
        <div class="flex-1 w-full flex justify-center animate__animated animate__fadeIn">
            <div id="board" class="grid-board w-full max-w-[550px]"></div>
        </div>

        <div class="w-full lg:w-80 space-y-4 animate__animated animate__fadeInRight">
            <div id="statusCard" class="glass p-6 rounded-2xl transition-all duration-500">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2">
                        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                        <span id="statusText" class="text-xs font-bold tracking-widest uppercase opacity-60">Connecting</span>
                    </div>
                    <span class="text-[10px] bg-white/10 px-2 py-1 rounded">v2.1 Stable</span>
                </div>
                
                <div class="space-y-4">
                    <div id="playerX" class="flex items-center justify-between p-3 rounded-xl transition-all">
                        <span class="font-medium text-blue-400">Hráč 1</span>
                        <span class="text-2xl">❌</span>
                    </div>
                    <div id="playerO" class="flex items-center justify-between p-3 rounded-xl transition-all">
                        <span class="font-medium text-red-400">Hráč 2</span>
                        <span class="text-2xl">⭕</span>
                    </div>
                </div>

                <div id="gameMsg" class="mt-6 text-center text-xl font-bold text-green-400 min-h-[1.5em]"></div>
            </div>

            <button onclick="resetGame()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg shadow-blue-900/20">
                RESTARTOVAT HRU
            </button>
            
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold tracking-wider">Sdílet místnost</p>
                <div class="flex gap-2">
                    <input type="text" id="shareUrl" readonly onclick="this.select()" 
                           class="flex-1 bg-black/40 text-blue-300 text-[11px] p-2 rounded-lg border border-white/10 cursor-pointer outline-none">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nazlzqzihfpwmtulfhim.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hemx6cXppaGZwd210dWxmaGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjE0MDEsImV4cCI6MjA4OTU5NzQwMX0.hEN9aqpXpgCe03qKjYos79iZKeC9JW9clqqKaBBHuis";

        const params = new URLSearchParams(window.location.search);
        let room = params.get('r') || Math.random().toString(36).substring(7);
        if (!params.get('r')) window.history.replaceState({}, '', '?r=' + room);
        document.getElementById('shareUrl').value = window.location.href;

        let sb, chan;
        let board = Array(100).fill(null);
        let turn = 'X';
        let active = true;
        let winIndices = [];

        function initSupabase() {
            sb = supabase.createClient(SB_URL, SB_KEY);
            chan = sb.channel('room_' + room, { config: { broadcast: { self: true } } });

            chan.on('broadcast', { event: 'move' }, ({ payload }) => {
                if (board[payload.idx] === null && active) {
                    board[payload.idx] = payload.symbol;
                    const win = checkWin(payload.idx, payload.symbol);
                    if (win) {
                        active = false;
                        winIndices = win;
                        document.getElementById('gameMsg').textContent = `VÍTĚZSTVÍ ${payload.symbol === 'X' ? '❌' : '⭕'}!`;
                    } else {
                        turn = payload.symbol === 'X' ? 'O' : 'X';
                    }
                    render();
                }
            })
            .on('broadcast', { event: 'reset' }, () => {
                board = Array(100).fill(null);
                turn = 'X';
                active = true;
                winIndices = [];
                document.getElementById('gameMsg').textContent = '';
                render();
            })
            .subscribe(status => {
                const dot = document.getElementById('statusDot');
                const txt = document.getElementById('statusText');
                const isOk = status === 'SUBSCRIBED';
                dot.className = `w-3 h-3 rounded-full ${isOk ? 'bg-green-500' : 'bg-orange-500'} ${isOk ? '' : 'animate-pulse'}`;
                txt.textContent = isOk ? 'Online' : 'Reconnecting';
            });
        }

        function checkWin(idx, symbol) {
            const size = 10;
            const r = Math.floor(idx / size);
            const c = idx % size;
            const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
            for (let [dr, dc] of dirs) {
                let line = [idx];
                [[dr, dc], [-dr, -dc]].forEach(([curDr, curDc]) => {
                    for (let i = 1; i < 5; i++) {
                        let nr = r + curDr * i, nc = c + curDc * i;
                        if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr * size + nc] === symbol) line.push(nr * size + nc);
                        else break;
                    }
                });
                if (line.length >= 5) return line;
            }
            return null;
        }

        function render() {
            const container = document.getElementById('board');
            container.innerHTML = '';
            board.forEach((val, i) => {
                const div = document.createElement('div');
                div.className = `cell ${val ? 'filled animate__animated animate__bounceIn' : ''} ${winIndices.includes(i) ? 'win' : ''}`;
                div.textContent = val === 'X' ? '❌' : (val === 'O' ? '⭕' : '');
                div.onclick = () => { if (active && !board[i]) chan.send({ type: 'broadcast', event: 'move', payload: { idx: i, symbol: turn } }); };
                container.appendChild(div);
            });
            
            // UI Turn indicator
            document.getElementById('playerX').className = `flex items-center justify-between p-3 rounded-xl transition-all ${turn === 'X' && active ? 'turn-active bg-blue-500/10' : 'opacity-40'}`;
            document.getElementById('playerO').className = `flex items-center justify-between p-3 rounded-xl transition-all ${turn === 'O' && active ? 'turn-active bg-red-500/10' : 'opacity-40'}`;
        }

        function resetGame() { chan.send({ type: 'broadcast', event: 'reset' }); }
        window.onload = () => { initSupabase(); render(); };
    </script>
</body>
</html>
