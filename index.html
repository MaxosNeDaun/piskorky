<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; }
        .grid-board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px; background: #444; border: 2px solid #444; width: 100%; max-width: 500px; aspect-ratio: 1; }
        .cell { background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; user-select: none; }
        .cell:hover { background: #333; }
        .cell.win { background: #166534; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl">
        <div class="flex-1 flex justify-center">
            <div id="board" class="grid-board"></div>
        </div>

        <div class="w-full md:w-64 space-y-4">
            <div class="bg-[#2a2a2a] p-4 rounded-lg border border-gray-700">
                <div class="flex items-center gap-2 mb-2">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></div>
                    <span id="statusText" class="text-xs font-mono uppercase">Odpojeno</span>
                </div>
                <div class="text-2xl font-bold mb-1" id="turnDisplay">Tahu: ❌</div>
                <div id="gameMsg" class="text-green-400 font-bold h-6"></div>
            </div>

            <button onclick="resetGame()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">
                Restartovat hru
            </button>
            
            <div class="text-[10px] text-gray-500 break-all bg-black p-2 rounded">
                Room ID: <span id="roomId" class="text-blue-400"></span>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://nazlzqzihfpwmtulfhim.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hemx6cXppaGZwd210dWxmaGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjE0MDEsImV4cCI6MjA4OTU5NzQwMX0.hEN9aqpXpgCe03qKjYos79iZKeC9JW9clqqKaBBHuis";

        // Inicializace místnosti
        const params = new URLSearchParams(window.location.search);
        let room = params.get('r') || Math.random().toString(36).substring(7);
        if (!params.get('r')) window.history.replaceState({}, '', '?r=' + room);
        document.getElementById('roomId').textContent = room;

        let sb, chan;
        let board = Array(100).fill(null);
        let turn = 'X';
        let active = true;

        function initSupabase() {
            sb = supabase.createClient(SB_URL, SB_KEY);
            chan = sb.channel('piskvorky_' + room, { config: { broadcast: { self: true } } });

            chan.on('broadcast', { event: 'move' }, ({ payload }) => {
                if (board[payload.idx] === null && active) {
                    board[payload.idx] = payload.symbol;
                    checkWin();
                    turn = payload.symbol === 'X' ? 'O' : 'X';
                    render();
                }
            })
            .on('broadcast', { event: 'reset' }, () => {
                board = Array(100).fill(null);
                turn = 'X';
                active = true;
                document.getElementById('gameMsg').textContent = '';
                render();
            })
            .subscribe(status => {
                const dot = document.getElementById('statusDot');
                const txt = document.getElementById('statusText');
                txt.textContent = status;
                dot.className = `w-3 h-3 rounded-full ${status === 'SUBSCRIBED' ? 'bg-green-500' : 'bg-orange-500'}`;
            });
        }

        function render() {
            const container = document.getElementById('board');
            container.innerHTML = '';
            board.forEach((val, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = val === 'X' ? '❌' : (val === 'O' ? '⭕' : '');
                div.onclick = () => sendMove(i);
                container.appendChild(div);
            });
            document.getElementById('turnDisplay').textContent = `Tahu: ${turn === 'X' ? '❌' : '⭕'}`;
        }

        function sendMove(idx) {
            if (!active || board[idx] !== null) return;
            chan.send({ type: 'broadcast', event: 'move', payload: { idx, symbol: turn } });
        }

        function checkWin() {

        }

        function resetGame() {
            chan.send({ type: 'broadcast', event: 'reset' });
        }

        window.onload = () => {
            initSupabase();
            render();
        };
    </script>
</body>
</html>
